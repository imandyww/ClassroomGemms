name: cactus
description: "Vendored + patched Cactus SDK synced to upstream v1.14 for voice-agents-hack-flutter."
version: 1.14.1+patched
publish_to: none
homepage: https://cactuscompute.com
repository: https://github.com/cactus-compute/cactus

environment:
  sdk: ^3.11.5
  flutter: ">=1.17.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.4
  http: ^1.5.0
  path_provider: ^2.1.5
  archive: ^4.0.7
  device_info_plus: ^12.4.0
  shared_preferences: ^2.5.3
  package_info_plus: ^9.0.1
  uuid: ^4.5.1
  objectbox: ^5.3.1
  objectbox_flutter_libs: ^5.3.1
  flat_buffers: ^25.9.23
  path: ^1.9.1
  record: ^6.1.1
  permission_handler: ^12.0.1
  android_id: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  build_version: ^2.1.2
  objectbox_generator: ^5.3.1

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
